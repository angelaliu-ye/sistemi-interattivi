<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Yes / No Game</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/p5.min.js"></script>

<style>

body{
  text-align:center;
  font-family:Arial; 
  color:#0D0D3D;
}

img,video{
  max-width:80vw;   /* 最多占屏幕宽的80% */
  max-height:80vh;  /* ⭐关键：最多占屏幕高的80% */
  width:auto;
  height:auto;
  border-radius:10px;
}

#homeScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;
  background:white;
}

#endScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  display:flex;
  justify-content:center;  /* 水平居中 */
  align-items:center;      /* ⭐ 垂直居中 */

  text-align:center;
  background:#0D0D3D;   /* ⭐改这里颜色 */
  color:white;
}

button{
  font-size:20px;
  padding:10px 30px;
  margin:10px;
  background:#0D0D3D;   /* 按钮底色 */
  color:white;
}

.fadeText{
  opacity:0;
  animation: fadeIn 6s ease forwards;
}

@keyframes fadeIn{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

#cameraSection{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  background:#0D0D3D;   /* ⭐这里改颜色 */
  color:white;        /* 字变白，不然看不见 */
}

</style>

</head>

<body>
  <!-- ⭐ 首页 -->
  <div id="homeScreen">
    <h1>Can you trust your eyes?</h1>

    <div class="btnGroup">
      <button onclick="startGame()">Yes</button>
      <button onclick="startGame()">No</button>
    </div>
  </div>

  <div id="gameSection" style="display:none">
    <div id="mediaContainer"></div>
    <h2 id="question1">Is this AI?</h2> 

    <div id="buttons">
      <button onclick="choose(true)">Yes</button>
      <button onclick="choose(false)">No</button>
    </div>
  </div>

  <div id="cameraSection" style="display:none">
    <div id="cameraWrapper">
      <video id="camera" autoplay playsinline></video> 
      <h2 id="question2">IS THIS AI?</h2>
      <button onclick="endGame()">Yes</button>
      <button onclick="endGame()">No</button>
    </div>
  </div>

<script>

  let items = [
    {type:"image",src:"1.jpg"},
    {type:"image",src:"2.jpg"},
    {type:"video",src:"video3.mp4"},
    {type:"image",src:"3.jpg"},
    {type:"image",src:"4.jpg"},
    {type:"image",src:"5.jpg"},
    {type:"image",src:"6.jpg"},
    {type:"video",src:"video2.mp4"},
    {type:"image",src:"7.jpg"},
    {type:"image",src:"8.jpg"},
    {type:"image",src:"9.jpg"},
    {type:"image",src:"10.jpg"},
    {type:"image",src:"11.jpg"},
    {type:"image",src:"12.jpg"},
    {type:"video",src:"video1.mp4"},
    {type:"image",src:"13.jpg"},
    {type:"image",src:"14.jpg"},
    {type:"image",src:"15.jpg"},
    {type:"image",src:"16.jpg"},
    {type:"image",src:"17.jpg"},
    {type:"image",src:"18.jpg"},
    {type:"image",src:"19.jpg"},
    {type:"image",src:"20.jpg"},
    {type:"image",src:"21.jpg"},
    {type:"image",src:"22.jpg"},
    {type:"image",src:"23.jpg"},
    {type:"image",src:"24.jpg"},
    {type:"image",src:"25.jpg"},
    {type:"image",src:"26.jpg"},
    {type:"image",src:"27.jpg"},
    {type:"image",src:"28.jpg"},
    {type:"video",src:"video4.mp4"},
    {type:"video",src:"video5.mp4"},
    {type:"video",src:"video6.mp4"},
    {type:"image",src:"29.jpg"},
    {type:"image",src:"30.jpg"},
    {type:"image",src:"31.jpg"},
    {type:"image",src:"32.jpg"},
    {type:"image",src:"33.jpg"},
    {type:"image",src:"34.jpg"},
    {type:"image",src:"35.jpg"},

  ]

  let currentIndex = 0
  let gameEnded = false
  let waveStarted = false

  function startGame(){
    document.getElementById("homeScreen").style.display = "none";
    document.getElementById("gameSection").style.display = "block";

    gameStarted = true;
    // 隐藏首页
    document.getElementById("homeScreen").style.display = "none";
    // 显示游戏
    document.getElementById("gameSection").style.display = "block";

    gameStarted = true; 
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  } 

  function loadItem(){
    let item = items[currentIndex]
    let container = document.getElementById("mediaContainer")

    if(item.type==="image"){
      container.innerHTML = `<img src="${item.src}">`
    }

    if(item.type==="video"){
      container.innerHTML = `
        <video controls autoplay>
          <source src="${item.src}" type="video/mp4">
        </video>
      `
    }
  }

  function choose(answer){
    if(gameEnded) return
    // ⭐ 第一次点击才启动水
    if(!waveStarted){
      waveStarted = true
      radius = 0   // 从0开始涨
    }
    currentIndex++;

    if(currentIndex < items.length){
      loadItem()
    }else{
      finalCorrosion()
    }
  }

  function endGame(){
    document.body.innerHTML = `
      <div id="endScreen">
        <h1 class="fadeText">Are you sure?</h1>
      </div>
    `
  }

  shuffle(items)
  loadItem()

  let radius = 0;     // 当前水位
  let speed = 0;      // 当前速度
  let gameStarted = false

  function setup() {
    let cnv = createCanvas(windowWidth, windowHeight);
    cnv.style('position', 'absolute');
    cnv.style('top', '0');
    cnv.style('left', '0');
    cnv.style('z-index', '0'); // 放在内容下面
    cnv.style('pointer-events', 'none'); // 不阻挡鼠标操作
    noStroke();
  }

  function draw() {
    clear();
    if (!gameStarted) return;   // ⭐ 首页时完全不画
    if (!waveStarted) return;

    let maxDist = dist(0, 0, width/2, height/2);
    let progress = radius / (maxDist ||1);  // 0 ~ 1

    let targetSpeed = 0.2 + progress * 1;  
    speed = lerp(speed, targetSpeed, 0.08);
    radius += speed;

    if(radius >= maxDist && !gameEnded){
      gameEnded = true;
      triggerEnd();
    }

    let step = 4;
  
    for (let x = 0; x < width; x += step) {
      for (let y = 0; y < height; y += step) {
        let d = dist(x, y, width/2, height/2);
        // 🌊 波动（边缘不规则）
        let wave = 80 * noise(x * 0.035, y * 0.035, frameCount * 0.035);
        // 🌊 当前边界
        let edge = maxDist - radius + wave;
        if (d > edge) {
          let c = 180 * noise(x * 0.1, y * 0.1);
          // 🌫️ 边缘渐变
          let alpha = map(d, edge - 50, edge, 0, 30);
          fill(c, alpha);
          rect(x, y, step, step);
        }
      }
    }
  }

  async function triggerEnd(){
    currentIndex = items.length
    noLoop()

    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:true
      })

      showCamera(stream)

    }catch(err){
      alert("You don’t trust your eyes… or yourself?")
    }
  }

  function showCamera(stream){
    // 👉 隐藏旧UI
    document.getElementById("mediaContainer").style.display="none"
    document.getElementById("buttons").style.display="none"
    document.getElementById("question1").style.display="none"
    // 👉 这里才隐藏 p5（现在才消失）
    let canvas = document.querySelector("canvas")
    if(canvas){
      canvas.style.display = "none"
    }

    const video = document.getElementById("camera")
    video.srcObject = stream
    document.getElementById("cameraSection").style.display="block"
  }

    // 窗口缩放自动调整
  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }

</script>
<div id="corrosion"></div>
</body>
</html>
